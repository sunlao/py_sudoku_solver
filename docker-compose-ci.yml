services:
  api:
    build:
      cache_from:
        - ghcr.io/sunlao/pss-api:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"  
    image: ghcr.io/sunlao/pss-api:latest
    environment:
      - PYTHONPATH=/app/src:/app
      - COVERAGE_PROCESS_START=/app/tox.ini
      - COVERAGE_FILE=/app/tests/.coverage.api
    volumes:
      - ./tox.ini:/app/tox.ini:ro
      - ./tests:/app/tests:rw

  test:
    build:
      cache_from:
        - ghcr.io/sunlao/pss-test:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: ghcr.io/sunlao/pss-test:latest
    volumes:
      - ./docs/code_coverage:/app/doc:rw
